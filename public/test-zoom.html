<!DOCTYPE html>
<html>
<head>
    <title>Zoom Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .controls { margin-bottom: 20px; }
        .canvas-container {
            width: 100%;
            height: 500px;
            overflow: auto;
            border: 2px solid #ddd;
            background: #f0f0f0;
        }
        .canvas {
            background: white;
            position: relative;
            border: 1px solid #999;
            margin: 20px;
        }
        .block {
            position: absolute;
            background: #3b82f6;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Canvas Zoom Test</h1>
    <div class="controls">
        <label>Zoom: <span id="zoomValue">100%</span></label>
        <input type="range" id="zoomSlider" min="25" max="200" step="25" value="100">
    </div>
    <div class="canvas-container">
        <div id="canvas" class="canvas"></div>
    </div>

    <script>
        const slider = document.getElementById('zoomSlider');
        const zoomValue = document.getElementById('zoomValue');
        const canvas = document.getElementById('canvas');

        // Test block in world coordinates
        const block = {
            x: 100, // world coordinates
            y: 100,
            width: 150,
            height: 100
        };

        function calculateActualScale(zoom) {
            return zoom * 0.008;
        }

        function updateCanvas() {
            const zoom = parseInt(slider.value);
            const actualScale = calculateActualScale(zoom);

            zoomValue.textContent = zoom + '%';

            // Scale canvas
            canvas.style.width = (1200 * actualScale) + 'px';
            canvas.style.height = (800 * actualScale) + 'px';

            // Clear and redraw block
            canvas.innerHTML = '';

            const blockEl = document.createElement('div');
            blockEl.className = 'block';
            blockEl.style.left = (block.x * actualScale) + 'px';
            blockEl.style.top = (block.y * actualScale) + 'px';
            blockEl.style.width = (block.width * actualScale) + 'px';
            blockEl.style.height = (block.height * actualScale) + 'px';
            blockEl.style.fontSize = (actualScale * 100) + '%';
            blockEl.textContent = 'Block at ' + zoom + '%';

            canvas.appendChild(blockEl);
        }

        slider.addEventListener('input', updateCanvas);
        updateCanvas();
    </script>
</body>
</html>
